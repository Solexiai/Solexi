<head>

  <title>You're on the list | Solexi</title>
  <meta name="description" content="Thank you for joining the Solexi early access list. Share with someone you care about." />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="icon" type="image/png" href="/favicon.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />

  <style>
  :root{
    --off-white:#f7f4ef;--cream:#ede8df;--stone:#c4bba8;--stone-text:#9a9080;
    --slate:#8fa3b1;--slate-deep:#4a7082;--slate-mid:#6e8fa0;
    --charcoal:#3a3530;--ink:#1e1c1a;--ok:#4a9e6e;
    --serif:'Cormorant Garamond',Georgia,serif;
    --sans:'Inter',system-ui,sans-serif;
    --t:.25s cubic-bezier(.4,0,.2,1);
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html{height:100%}
  body{
    font-family:var(--sans);background:var(--off-white);color:var(--charcoal);
    -webkit-font-smoothing:antialiased;min-height:100vh;
    display:flex;align-items:center;justify-content:center;padding:28px;
  }
  a{color:var(--slate-deep);text-decoration:none}
  a:hover{text-decoration:underline}
  ::selection{background:var(--slate);color:#fff}

  .wrap{width:100%;max-width:640px}

  /* ── HEADER ── */
  .top{
    display:flex;align-items:center;justify-content:space-between;
    gap:16px;margin-bottom:24px;flex-wrap:wrap;
  }
  .logo{
    display:flex;align-items:center;gap:9px;
    font-family:var(--serif);font-size:16px;font-weight:500;
    letter-spacing:.08em;color:var(--ink);
  }
  .logo svg{flex-shrink:0}
  .status{
    display:inline-flex;align-items:center;gap:8px;
    padding:8px 16px;border-radius:20px;
    background:#fff;border:1px solid var(--cream);
    font-size:12px;font-weight:500;color:var(--charcoal);
  }
  .status-dot{
    width:10px;height:10px;border-radius:50%;background:var(--ok);
    box-shadow:0 0 0 4px rgba(74,158,110,.15);flex-shrink:0;
  }

  /* ── CARD ── */
  .card{
    background:#fff;border:1px solid var(--cream);border-radius:3px;
    padding:48px 40px;box-shadow:0 4px 20px rgba(30,28,26,.08);
  }
  h1{
    font-family:var(--serif);font-size:clamp(32px,5vw,48px);
    font-weight:300;color:var(--ink);line-height:1.1;margin-bottom:16px;
  }
  h1 em{font-style:italic;color:var(--slate-deep)}
  .sub{
    font-size:15px;line-height:1.8;color:var(--stone-text);margin-bottom:28px;
  }

  /* ── CALLOUT ── */
  .callout{
    background:var(--off-white);border:1px solid var(--cream);
    border-left:3px solid var(--slate);border-radius:3px;
    padding:20px 24px;margin-bottom:32px;
  }
  .callout q{
    font-family:var(--serif);font-size:18px;font-style:italic;
    color:var(--ink);line-height:1.5;quotes:"\201C" "\201D";
  }

  /* ── BUTTONS ── */
  .btns{display:flex;flex-direction:column;gap:12px}
  .btn{
    display:flex;align-items:center;justify-content:center;gap:10px;
    width:100%;padding:16px 24px;border-radius:24px;
    font-size:14px;font-weight:500;cursor:pointer;
    border:1px solid var(--cream);background:#fff;color:var(--charcoal);
    font-family:var(--sans);transition:all var(--t);
  }
  .btn:hover{border-color:var(--slate);background:var(--cream);text-decoration:none}
  .btn-p{
    background:var(--slate-deep);color:#fff;border-color:var(--slate-deep);
    box-shadow:0 2px 12px rgba(74,112,130,.3);
  }
  .btn-p:hover{background:var(--slate-mid);border-color:var(--slate-mid)}
  .btn svg{flex-shrink:0}

  @media(max-width:480px){
    body{padding:20px}
    .card{padding:32px 22px}
  }
  </style>
</head>
<body>
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-5DZLVZS9" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>

<div class="wrap">
  <header class="top">
    <a href="/" class="logo" aria-label="Solexi.ai — Home">
      <svg width="24" height="24" viewBox="0 0 26 26" fill="none" aria-hidden="true"><polygon points="13,1 25,7 25,19 13,25 1,19 1,7" fill="#1e1c1a"/><polygon points="13,5 21,9.5 21,16.5 13,21 5,16.5 5,9.5" fill="none" stroke="#8fa3b1" stroke-width="0.8"/><circle cx="13" cy="13" r="1.8" fill="#8fa3b1"/></svg>
      SOLEXI.AI
    </a>
    <div class="status" aria-label="Inscription confirmée">
      <span class="status-dot" aria-hidden="true"></span>
      Confirmed · Founding Cohort 2026
    </div>
  </header>

  <main class="card">
    <h1>You're on <em>the list.</em></h1>
    <p class="sub">We'll notify you when early access opens. If you'd like to help, share this with someone you care about.</p>

    <div class="callout">
      <q>When you die, who can access your digital life — and how?</q>
    </div>

    <div class="btns">
      <a id="facebookBtn" class="btn btn-p"
         href="https://www.facebook.com/sharer/sharer.php?u=https%3A%2F%2Fsolexi.ai%2F"
         target="_blank" rel="noopener noreferrer" aria-label="Share Solexi on Facebook">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
        Share on Facebook
      </a>
      <button id="messengerBtn" class="btn" type="button" aria-label="Share Solexi on Messenger">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 0C5.373 0 0 4.975 0 11.111c0 3.497 1.745 6.616 4.472 8.652V24l4.086-2.242c1.09.301 2.246.464 3.442.464 6.627 0 12-4.974 12-11.111S18.627 0 12 0zm1.193 14.963l-3.056-3.259-5.963 3.259L10.732 8.2l3.131 3.259 5.889-3.259-6.559 6.763z"/></svg>
        Share on Messenger
      </button>
    </div>
  </main>
</div>

<script>
(function(){
  'use strict';
  var SHARE_URL = 'https://solexi.ai/';
  var isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

  window.dataLayer = window.dataLayer || [];
  window.dataLayer.push({ event: 'waitlist_thank_you_view' });

  document.getElementById('facebookBtn').addEventListener('click', function(){
    window.dataLayer.push({ event: 'share_click', platform: 'facebook' });
  });

  document.getElementById('messengerBtn').addEventListener('click', function(){
    window.dataLayer.push({ event: 'share_click', platform: 'messenger' });
    if(isMobile){
      window.location.href = 'fb-messenger://share/?link=' + encodeURIComponent(SHARE_URL);
      return;
    }
    window.open(
      'https://www.facebook.com/sharer/sharer.php?u=' + encodeURIComponent(SHARE_URL),
      '_blank', 'noopener,noreferrer'
    );
  });
})();
</script>
</body>
</html>
